<!DOCTYPE html>

<html>

<head>
    <title>Registrar - Controle de Gastos</title>
</head>

<body class="centralize">
    <form>
        <div class="form-field">
            <div><label>Email</label></div>
            <input type="email" placeholder="seu@email.com" 
                onchange="onChangeEmail()" 
                id="email"/>
            <div class="error" id="email-required-error">
                Insira um e-mail
            </div>
            <div class="error" id="email-invalid-error">
                Informe um e-mail válido
            </div>
        </div>
        <div class="form-field">
            <div><label>Senha</label></div>
            <input type="password" placeholder="Senha"
                onchange="onChangePassword()"
                id="password"/>
            <div class="error" id="password-required-error">
                Insira uma Senha
            </div>
            <div class="error" id="password-min-length-error">
                A senha deve ter no mínimo 6 caracteres
            </div>
        </div>
        <div class="form-field">
            <div><label>Confirmar Senha</label></div>
            <input type="password" placeholder="Confirmar Senha"
                onchange="onChangeConfirmPassword()"
                id="confirmPassword"/>
            <div class="error" id="password-doesnt-match-error">
                Senha e Confirmar Senha devem ser iguais
            </div>
        </div>
        <div>
            <button type="button" class="solid" disabled 
                onclick="register()"
                id="register-button">
                Registrar
            </button>
        </div>
        <div>
            <button type="button" class="clear">
                Entrar
            </button>
        </div>
    </form>
</body>

<link rel="stylesheet" href="../../global.css" />
<link rel="stylesheet" href="register.css" />

<script src="register.js"></script>
<script src="../../validations.js"></script>
<script src="../../loading.js"></script>

<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>
<script src="../../firebase-init.js"></script>


</html>
